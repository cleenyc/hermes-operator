name: Hermes Operator CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Run core and source-only plugin checks
        run: make check

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build and verify a reproducible complete release
        shell: bash
        run: |
          set -euo pipefail
          make release
          test -f dist/hermes_operator-0.5.0-py3-none-any.whl
          test -f dist/hermes_operator_plugin-1.6.0-py3-none-any.whl
          first="$(sha256sum dist/hermes-operator-0.5.0-complete.tar.gz | cut -d ' ' -f 1)"
          make release
          second="$(sha256sum dist/hermes-operator-0.5.0-complete.tar.gz | cut -d ' ' -f 1)"
          test "$first" = "$second"

  real-host:
    continue-on-error: ${{ matrix.experimental }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - hermes_ref: 9de9c25f620ff7f1ce0fd5457d596052d5159596
            experimental: false
            enforce_pin: "1"
          - hermes_ref: main
            experimental: true
            enforce_pin: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install selected Hermes host
        run: >-
          python -m pip install
          "git+https://github.com/NousResearch/hermes-agent.git@${{ matrix.hermes_ref }}"
      - name: Install Operator plugin
        run: python -m pip install ./integrations/hermes_operator_plugin
      - name: Exercise real host contracts
        env:
          HERMES_OPERATOR_REQUIRE_HOST_INTEGRATION: "1"
          HERMES_OPERATOR_REQUIRE_PINNED_HOST: ${{ matrix.enforce_pin }}
        run: >-
          python -m unittest discover
          -s integrations/hermes_operator_plugin/tests
          -p "test_hermes_host_integration.py"
          -v
