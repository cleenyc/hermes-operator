[operator]
instance_id = "personal-operator"
database_path = "data/operator.db"
data_dir = "data"
timezone = "America/New_York"
autonomy_mode = "shadow" # shadow | internal | active
tick_seconds = 30
reconciliation_seconds = 300
# Full eventless LLM reconsideration. Lightweight recovery still runs at the
# reconciliation interval, while events wake reasoning immediately.
reasoning_refresh_seconds = 3600
max_events_per_pass = 25
max_parallel_work = 4
# Maximum dispatch authorizations one validated model pass may issue.
max_authorizations_per_pass = 40
# Must exceed llm.timeout_seconds by more than 30 seconds.
event_lease_seconds = 300
event_max_attempts = 5

[llm]
provider = "openai_compatible" # openai_compatible | command
model = "configure-at-deployment"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
timeout_seconds = 180
temperature = 0.1
max_output_tokens = 8000
command = []
# Local command planners receive a minimal environment plus only these names.
# Never pass the operator admin, bridge, approval, or unrelated outbound secrets.
pass_env = []

[hermes]
enabled = false
binary = "hermes"
profile = "operator"
board = "default"
# These defaults and allowed_profiles form the execution-profile allowlist.
# Install the plugin and attest each selected profile independently.
default_assignee = "operator"
orchestrator_profile = "operator"
command_timeout_seconds = 120
goal_mode = false
default_skills = []
# Parallel compute uses independent canonical Operator cards up to
# max_parallel_work. Current background delegate_task is blocked on managed cards.
allowed_profiles = ["operator"]
allowed_skills = []
# Only explicitly named environment variables are added to the safe Hermes child env.
# Never pass admin, bridge, approval, run-control, or outbound credentials.
pass_env = []
dispatch_authorization_ttl_seconds = 86400
max_execution_attempts = 3
# Required with enabled = true in internal or active mode. This is the
# authenticated Hermes Kanban run-control API used to terminate native compute.
control_base_url = ""
control_token_env = "HERMES_KANBAN_CONTROL_TOKEN"
control_timeout_seconds = 10
require_policy_attestation = true
# The native plugin heartbeat defaults to 120 seconds. Keep this core TTL above it.
policy_attestation_ttl_seconds = 300
allowed_plugin_versions = ["1.5.0"]
allowed_policy_versions = ["6.0.0"]
# Exact SHA-256 of integrations/hermes_operator_plugin/policy.py in this release.
# Recompute, review, and update this allowlist whenever that policy source changes.
allowed_policy_digests = ["e1f6f56429df64374f9c8b32682a773706b2e35cf5711753904149e503fc31a0"]

[obsidian]
enabled = false
vault_path = ""
discover = true
operator_root = "Hermes Operator"
write_mode = "projection"

[native_automation]
# Desired Hermes-owned loops. Installation is explicit because OAuth, gateway,
# private delivery targets, and the vault path are deployment-owned.
enabled = false
delivery = "local" # Set a private Hermes target such as telegram or slack.
google_intake_enabled = true
google_intake_schedule = "every 10m"
reminder_delivery_enabled = true
reminder_schedule = "every 15m"
attention_redelivery_seconds = 3600
briefing_enabled = true
briefing_schedule = "0 8 * * *"
attach_to_session = true
google_skill = "google-workspace"
obsidian_skill = "obsidian"

[server]
enabled = true
host = "${HERMES_OPERATOR_BIND_HOST:-127.0.0.1}"
port = 8787
api_token_env = "HERMES_OPERATOR_API_TOKEN"
# Scoped native-plugin credential. It must differ from the admin token.
bridge_token_env = "HERMES_OPERATOR_BRIDGE_TOKEN"
max_body_bytes = 1048576
allow_unsigned_webhooks = false

[server.webhook_secrets]
# gmail = "${GMAIL_WEBHOOK_SECRET}"
# calendar = "${CALENDAR_WEBHOOK_SECRET}"

[policy]
external_actions_require_approval = true
external_action_mode = "stage_only" # disabled | stage_only | approved
approval_ttl_seconds = 3600
# Never pass this or any outbound connector secret to Hermes.
approval_secret_env = "HERMES_OPERATOR_APPROVAL_SECRET"
# Declarative in this release. Trust comes from the authenticated ingress path.
trusted_event_sources = ["operator", "system"]
# Reserved in this release. Memory still requires operator promotion.
allow_memory_auto_promotion = false
max_llm_priority_adjustment = 10.0

[verification]
enabled = true
max_artifacts = 64
max_files_per_directory = 2000
max_artifact_bytes = 268435456
max_total_artifact_bytes = 536870912

# Late-bind each Hermes workspace or artifact store visible to the core.
# Native completion artifacts outside these roots fail verification closed.
[verification.artifact_roots]
# workspace = "${HERMES_OPERATOR_WORKSPACE:-/srv/hermes/workspace}"

# Checks are optional, fixed deployment-owned argv. A work item runs a check
# only when its protected verification_contract names it.
# [[verification.checks]]
# name = "unit-tests"
# command = ["python", "-m", "pytest", "-q"]
# cwd = "${HERMES_OPERATOR_WORKSPACE:-/srv/hermes/workspace}"
# timeout_seconds = 300
# max_output_bytes = 1048576
# pass_env = []

# Optional extension for non-Google providers or externally managed readers.
# Native Google intake above uses Hermes OAuth and the google-workspace skill.
# [[inbound_connectors]]
# name = "mail-reader"
# source = "mail"
# command = ["/opt/hermes-connectors/mail-reader"]
# enabled = true
# interval_seconds = 60
# timeout_seconds = 60
